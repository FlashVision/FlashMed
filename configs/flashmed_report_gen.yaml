train_split: train
val_split: val
num_workers: 4

modality: xray
multi_label: false
dicom_input: false

lora: true
lora_rank: 16
lora_alpha: 32.0
lora_dropout: 0.05

save_dir: workspace/report_generation
device: cuda
mixed_precision: true
seed: 42
