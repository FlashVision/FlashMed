task: report_gen
model_name: med_vlm
num_classes: 0
input_size: 224
in_channels: 3
pretrained: false

epochs: 30
batch_size: 8
learning_rate: 0.00005
weight_decay: 0.01
optimizer: adamw
scheduler: cosine
warmup_epochs: 3

